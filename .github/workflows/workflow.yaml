---
name: Package

on:
  push:
    branches:
      - main
      - initial
  pull_request:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: "ghcr.io/shiftclack/lua-wow:1.3.0"
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: check
        run: |
          make check-ci

      - name: build and upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          make dist-ci
          release-upload.sh "${REPOSITORY}" "${TAG}" "Deathpool-${TAG}.zip" "dist/Deathpool.zip"
